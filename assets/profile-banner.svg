<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Denis Paval — Full-stack developer and founder of Lumax</title>
  <desc id="desc">Dark blue and violet profile banner with Denis Paval's name, role, and primary technologies.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08090D"/>
      <stop offset="0.58" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#11102A"/>
    </linearGradient>
    <linearGradient id="accent" x1="82" y1="74" x2="586" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52A8FF"/>
      <stop offset="0.48" stop-color="#6D5DFB"/>
      <stop offset="1" stop-color="#B14DFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1100 80) rotate(135) scale(390 330)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#724DFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#724DFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#A8B3CF" stroke-opacity="0.055"/>
    </pattern>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="28" fill="url(#background)"/>
  <rect width="1280" height="320" rx="28" fill="url(#grid)"/>
  <rect width="1280" height="320" rx="28" fill="url(#glow)"/>
  <circle cx="1132" cy="114" r="118" fill="#5A4DFF" fill-opacity="0.17" filter="url(#blur)"/>
  <circle cx="1218" cy="252" r="82" fill="#2A9DFF" fill-opacity="0.14" filter="url(#blur)"/>

  <rect x="70" y="56" width="58" height="58" rx="16" fill="url(#accent)"/>
  <path d="M88 73V99H111" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="70" y="177" fill="#F7F8FC" font-family="Inter, Manrope, Arial, sans-serif" font-size="54" font-weight="750" letter-spacing="-1.6">DENIS PAVAL</text>
  <text x="73" y="216" fill="#A8B3CF" font-family="Inter, Manrope, Arial, sans-serif" font-size="19" font-weight="550" letter-spacing="2.2">FULL-STACK DEVELOPER · FOUNDER OF LUMAX</text>

  <g transform="translate(73 250)">
    <circle cx="6" cy="6" r="6" fill="#58B8FF"/>
    <text x="23" y="12" fill="#D8DDED" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">React</text>
    <circle cx="111" cy="6" r="6" fill="#62D7A4"/>
    <text x="128" y="12" fill="#D8DDED" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Vue 3</text>
    <circle cx="229" cy="6" r="6" fill="#8C7CFF"/>
    <text x="246" y="12" fill="#D8DDED" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">TypeScript</text>
  </g>

  <path d="M1028 80H1168M1028 240H1210" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <rect x="1032" y="104" width="176" height="112" rx="20" stroke="#C8C3FF" stroke-opacity="0.22"/>
  <rect x="1054" y="128" width="92" height="9" rx="4.5" fill="#F7F8FC" fill-opacity="0.9"/>
  <rect x="1054" y="151" width="128" height="7" rx="3.5" fill="#A8B3CF" fill-opacity="0.38"/>
  <rect x="1054" y="171" width="104" height="7" rx="3.5" fill="#A8B3CF" fill-opacity="0.25"/>
  <rect x="1054" y="193" width="50" height="7" rx="3.5" fill="url(#accent)"/>

  <rect x="0.75" y="0.75" width="1278.5" height="318.5" rx="27.25" stroke="#C8C3FF" stroke-opacity="0.12" stroke-width="1.5"/>
</svg>
